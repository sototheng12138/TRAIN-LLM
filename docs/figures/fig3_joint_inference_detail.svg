<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="ar3" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1b4332"/>
    </marker>
    <linearGradient id="latentG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6b5b95"/>
      <stop offset="100%" stop-color="#4a3d6b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <title>Joint Inference Detail</title>
  <!-- Latent (input to this block) -->
  <rect x="260" y="24" width="120" height="48" rx="6" fill="url(#latentG)" stroke="#3d2d5a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="320" y="48" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Latent Repr.</text>
  <text x="320" y="64" text-anchor="middle" fill="#d0cce0" font-size="9">(from frozen LLM)</text>
  <line x1="320" y1="72" x2="320" y2="108" stroke="#1b4332" stroke-width="2" marker-end="url(#ar3)"/>
  <text x="330" y="95" text-anchor="start" fill="#555" font-size="9">split</text>

  <!-- Two branches -->
  <rect x="80" y="118" width="220" height="140" rx="8" fill="#e8f5e9" stroke="#2d6a4f" stroke-width="1.5"/>
  <text x="190" y="148" text-anchor="middle" fill="#1b4332" font-size="13" font-weight="bold">Numerical Prediction Head</text>
  <rect x="100" y="162" width="180" height="36" rx="4" fill="white" stroke="#4a7c59" stroke-width="1"/>
  <text x="190" y="184" text-anchor="middle" fill="#2d5a3d" font-size="10">MLP: R^d &#x2192; R^(T&#x00D7;C)</text>
  <text x="190" y="208" text-anchor="middle" fill="#555" font-size="10">Output: Y_hat (predicted series)</text>
  <text x="190" y="232" text-anchor="middle" fill="#2d6a4f" font-size="10" font-weight="bold">Loss: L_ZI-MSE(Y_hat, Y)</text>
  <text x="190" y="250" text-anchor="middle" fill="#777" font-size="9">Zero-inflated MSE for sparse TS</text>

  <rect x="340" y="118" width="220" height="140" rx="8" fill="#e8f5e9" stroke="#2d6a4f" stroke-width="1.5"/>
  <text x="450" y="148" text-anchor="middle" fill="#1b4332" font-size="13" font-weight="bold">Auxiliary Deduction Head</text>
  <rect x="360" y="162" width="180" height="36" rx="4" fill="white" stroke="#4a7c59" stroke-width="1"/>
  <text x="450" y="184" text-anchor="middle" fill="#2d5a3d" font-size="10">MLP: R^d &#x2192; R^2 (logits)</text>
  <text x="450" y="208" text-anchor="middle" fill="#555" font-size="10">Output: P(Dispatch), P(Idle)</text>
  <text x="450" y="232" text-anchor="middle" fill="#2d6a4f" font-size="10" font-weight="bold">Loss: L_Aux = BCE(logits, C_disp)</text>
  <text x="450" y="250" text-anchor="middle" fill="#777" font-size="9">C_disp from data (label-free)</text>

  <line x1="200" y1="108" x2="200" y2="118" stroke="#1b4332" stroke-width="1.5" marker-end="url(#ar3)"/>
  <line x1="440" y1="108" x2="440" y2="118" stroke="#1b4332" stroke-width="1.5" marker-end="url(#ar3)"/>

  <!-- Pseudo-label box -->
  <rect x="180" y="278" width="280" height="90" rx="8" fill="#fafafa" stroke="#757575" stroke-width="1.5"/>
  <text x="320" y="308" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">Data-Derived Pseudo-Label (Training Only)</text>
  <text x="320" y="330" text-anchor="middle" fill="#555" font-size="11">C_disp = 1  if  &#x2211; Y_future &gt; &#x3B5;  else  0</text>
  <text x="320" y="352" text-anchor="middle" fill="#666" font-size="10">No human annotation; derived from ground-truth future window only.</text>
  <line x1="190" y1="258" x2="260" y2="278" stroke="#666" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#ar3)"/>
  <line x1="450" y1="258" x2="380" y2="278" stroke="#666" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#ar3)"/>
  <text x="318" y="272" text-anchor="middle" fill="#777" font-size="8">supervise L_Aux</text>

  <!-- Joint objective -->
  <rect x="180" y="382" width="280" height="14" rx="2" fill="#1b4332"/>
  <text x="320" y="393" text-anchor="middle" fill="white" font-size="10">L_total = L_ZI-MSE + &#x3BB; L_Aux   (&#x3BB; &gt; 0)</text>
</svg>
