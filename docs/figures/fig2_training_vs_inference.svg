<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="ar2" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#333"/>
    </marker>
    <linearGradient id="trainBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8f4f8"/>
      <stop offset="100%" stop-color="#f0f8f0"/>
    </linearGradient>
    <linearGradient id="infBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fff8f0"/>
      <stop offset="100%" stop-color="#f8fff8"/>
    </linearGradient>
  </defs>
  <title>Training vs Inference</title>
  <!-- Training phase -->
  <rect x="20" y="20" width="410" height="380" rx="10" fill="url(#trainBg)" stroke="#3d7a94" stroke-width="2"/>
  <text x="225" y="52" text-anchor="middle" fill="#1b4332" font-size="16" font-weight="bold">Training Phase</text>
  <rect x="40" y="70" width="370" height="80" rx="6" fill="white" stroke="#5a9fb8" stroke-width="1"/>
  <text x="225" y="98" text-anchor="middle" fill="#2c5f75" font-size="12" font-weight="bold">Input: (x_hist, x_future), Domain Prompts</text>
  <text x="225" y="118" text-anchor="middle" fill="#555" font-size="10">Patching then Frozen LLM backbone to latent representations</text>
  <line x1="225" y1="155" x2="225" y2="185" stroke="#333" stroke-width="1.5" marker-end="url(#ar2)"/>
  <rect x="80" y="190" width="270" height="100" rx="6" fill="#d8f0e0" stroke="#2d6a4f" stroke-width="1.5"/>
  <text x="215" y="218" text-anchor="middle" fill="#1b4332" font-size="11" font-weight="bold">Joint Heads</text>
  <text x="215" y="238" text-anchor="middle" fill="#2d6a4f" font-size="10">Num: Y_hat vs Y (L_ZI-MSE)</text>
  <text x="215" y="256" text-anchor="middle" fill="#2d6a4f" font-size="10">Aux: logits vs C_disp (L_Aux, BCE)</text>
  <text x="215" y="278" text-anchor="middle" fill="#555" font-size="9">L_total = L_ZI-MSE + &#x3BB; L_Aux</text>
  <rect x="80" y="305" width="270" height="72" rx="6" fill="#f5f5f5" stroke="#666" stroke-width="1"/>
  <text x="215" y="330" text-anchor="middle" fill="#333" font-size="11" font-weight="bold">Pseudo-Label (no human label)</text>
  <text x="215" y="350" text-anchor="middle" fill="#555" font-size="10">C_disp = 1 if sum(Y_future) &gt; 0 else 0</text>
  <text x="215" y="368" text-anchor="middle" fill="#777" font-size="9">Derived from ground-truth future window only</text>
  <line x1="350" y1="240" x2="380" y2="340" stroke="#666" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#ar2)"/>
  <text x="395" y="338" text-anchor="start" fill="#555" font-size="8">supervise</text>

  <!-- Inference phase -->
  <rect x="450" y="20" width="410" height="380" rx="10" fill="url(#infBg)" stroke="#b8860b" stroke-width="2"/>
  <text x="655" y="52" text-anchor="middle" fill="#5a3d0a" font-size="16" font-weight="bold">Inference Phase</text>
  <rect x="470" y="70" width="370" height="80" rx="6" fill="white" stroke="#c49a6c" stroke-width="1"/>
  <text x="655" y="98" text-anchor="middle" fill="#5a3d0a" font-size="12" font-weight="bold">Input: x_hist, Domain Prompts (no future)</text>
  <text x="655" y="118" text-anchor="middle" fill="#555" font-size="10">Same backbone and joint heads; no gradient</text>
  <line x1="655" y1="155" x2="655" y2="185" stroke="#333" stroke-width="1.5" marker-end="url(#ar2)"/>
  <rect x="510" y="190" width="290" height="100" rx="6" fill="#fff8e6" stroke="#b8860b" stroke-width="1.5"/>
  <text x="655" y="218" text-anchor="middle" fill="#5a3d0a" font-size="11" font-weight="bold">Deterministic Decoding</text>
  <text x="655" y="238" text-anchor="middle" fill="#555" font-size="10">Num head: predicted series Y_hat</text>
  <text x="655" y="256" text-anchor="middle" fill="#555" font-size="10">Aux head: P(dispatch), argmax � 0/1</text>
  <text x="655" y="276" text-anchor="middle" fill="#555" font-size="10">Active days: count days with Y_hat(t) &gt; &#x3B5;</text>
  <text x="655" y="294" text-anchor="middle" fill="#777" font-size="9">Template-based text (zero hallucination)</text>
  <rect x="510" y="305" width="290" height="72" rx="6" fill="#fffef5" stroke="#b8860b" stroke-width="1"/>
  <text x="655" y="332" text-anchor="middle" fill="#333" font-size="11" font-weight="bold">Dispatch Log (example)</text>
  <text x="655" y="352" text-anchor="middle" fill="#555" font-size="9">Dispatch exists ~99% (3 active days). Consistent with volume. Suggestion: fleet and payload.</text>

  <!-- Center divider -->
  <line x1="440" y1="30" x2="440" y2="400" stroke="#ccc" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="445" y="210" text-anchor="start" fill="#888" font-size="10" transform="rotate(90 445 210)">Train / Infer</text>

  <text x="440" y="415" text-anchor="middle" fill="#444" font-size="11" font-style="italic">Fig. 2. Training uses pseudo-labels from future window; inference uses only history and produces interpretable dispatch log.</text>
</svg>
