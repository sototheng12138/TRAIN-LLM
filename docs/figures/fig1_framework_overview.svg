<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2c3e50"/>
    </marker>
    <linearGradient id="inputG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5a9fb8"/>
      <stop offset="100%" stop-color="#3d7a94"/>
    </linearGradient>
    <linearGradient id="llmG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6b5b95"/>
      <stop offset="100%" stop-color="#4a3d6b"/>
    </linearGradient>
    <linearGradient id="jointG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2d6a4f"/>
      <stop offset="100%" stop-color="#1b4332"/>
    </linearGradient>
    <linearGradient id="outG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b8860b"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
  </defs>
  <title>TIME-LLM Framework Overview</title>
  <!-- Input -->
  <rect x="20" y="100" width="140" height="120" rx="8" fill="url(#inputG)" stroke="#2c5f75" stroke-width="1.5"/>
  <text x="90" y="132" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Input</text>
  <text x="90" y="155" text-anchor="middle" fill="#e0f4f8" font-size="11">Time Series</text>
  <text x="90" y="172" text-anchor="middle" fill="#e0f4f8" font-size="11">Domain Prompts</text>
  <text x="90" y="195" text-anchor="middle" fill="#b8e0e8" font-size="10">Patching</text>
  <line x1="160" y1="160" x2="200" y2="160" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow1)"/>
  <!-- Backbone -->
  <rect x="200" y="80" width="180" height="160" rx="8" fill="url(#llmG)" stroke="#3d2d5a" stroke-width="1.5"/>
  <text x="290" y="110" text-anchor="middle" fill="white" font-size="14" font-weight="bold">TIME-LLM Backbone</text>
  <text x="290" y="132" text-anchor="middle" fill="#e8e4f0" font-size="11">(Frozen LLM)</text>
  <rect x="220" y="148" width="140" height="36" rx="4" fill="rgba(255,255,255,0.15)" stroke="#fff" stroke-width="0.8"/>
  <text x="290" y="170" text-anchor="middle" fill="white" font-size="10">Patch Embed + LLM</text>
  <text x="290" y="200" text-anchor="middle" fill="#d0cce0" font-size="10">Flatten</text>
  <text x="290" y="222" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Latent Representations</text>
  <line x1="380" y1="160" x2="420" y2="160" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow1)"/>
  <!-- Joint Inference -->
  <rect x="420" y="60" width="260" height="200" rx="8" fill="#f0faf4" stroke="#2d6a4f" stroke-width="2"/>
  <text x="550" y="88" text-anchor="middle" fill="#1b4332" font-size="13" font-weight="bold">Joint Inference (Ours)</text>
  <rect x="438" y="100" width="110" height="72" rx="6" fill="#d8f0e0" stroke="#2d6a4f" stroke-width="1"/>
  <text x="493" y="128" text-anchor="middle" fill="#1b4332" font-size="11" font-weight="bold">Numerical Head</text>
  <text x="493" y="148" text-anchor="middle" fill="#2d6a4f" font-size="10">MLP</text>
  <text x="493" y="165" text-anchor="middle" fill="#555" font-size="9">Predicted Series Y</text>
  <rect x="562" y="100" width="110" height="72" rx="6" fill="#d8f0e0" stroke="#2d6a4f" stroke-width="1"/>
  <text x="617" y="128" text-anchor="middle" fill="#1b4332" font-size="11" font-weight="bold">Auxiliary Head</text>
  <text x="617" y="148" text-anchor="middle" fill="#2d6a4f" font-size="10">MLP</text>
  <text x="617" y="165" text-anchor="middle" fill="#555" font-size="9">Dispatch / Idle (0/1)</text>
  <rect x="438" y="188" width="234" height="56" rx="6" fill="#e8f5e9" stroke="#4a7c59" stroke-width="1"/>
  <text x="555" y="210" text-anchor="middle" fill="#2d5a3d" font-size="10" font-weight="bold">Data-Derived Pseudo-Labels: sum(future) &gt; 0</text>
  <text x="555" y="228" text-anchor="middle" fill="#555" font-size="9">L_total = L_ZI-MSE + &#x3BB; L_Aux (label-free)</text>
  <line x1="680" y1="160" x2="720" y2="160" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow1)"/>
  <!-- Output -->
  <rect x="720" y="100" width="160" height="120" rx="8" fill="url(#outG)" stroke="#7a5a1a" stroke-width="1.5"/>
  <text x="800" y="132" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Output</text>
  <text x="800" y="155" text-anchor="middle" fill="#fff8e6" font-size="11">Y (forecast)</text>
  <text x="800" y="172" text-anchor="middle" fill="#fff8e6" font-size="11">Dispatch status + conf.</text>
  <text x="800" y="195" text-anchor="middle" fill="#ffe4b3" font-size="10">Template decoding</text>
  <!-- Caption -->
  <text x="450" y="300" text-anchor="middle" fill="#444" font-size="11" font-style="italic">Fig. 1. TIME-LLM: Event-driven reprogramming with label-free auxiliary deduction.</text>
</svg>
